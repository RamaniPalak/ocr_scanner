name: ocr_scanner_app
description: A new Flutter project for scanning cards and passbooks.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_mlkit_text_recognition: ^0.11.0
  camera: ^0.10.5
